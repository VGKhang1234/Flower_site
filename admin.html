     Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script
      type="text/javascript"
      src="https://www.gstatic.com/charts/loader.js"
    ></script>
    <script type="text/javascript">
      google.charts.load("current", { packages: ["corechart"] });
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ["Ngày", "Doanh thu (VNĐ)"],
          ["25/01", 5000000],
          ["26/01", 7000000],
          ["27/01", 6500000],
          ["28/01", 8000000],
          ["29/01", 9000000],
          ["30/01", 7500000],
          ["31/01", 10000000],
        ]);

        var options = {
          title: "Doanh thu từng ngày",
          hAxis: { title: "Ngày" },
          vAxis: { title: "Doanh thu (VNĐ)" },
          legend: { position: "none" },
          colors: ["#FF8C00"],
        };

        var chart = new google.visualization.ColumnChart(
          document.getElementById("revenue_chart"),
        );
        chart.draw(data, options);
      }
    </script>
    <script>
      const API_ORDERS = 'http://localhost:3000/orders';
const API_PRODUCTS = 'http://localhost:3000/products';
const API_USERS = 'http://localhost:3000/users';

document.addEventListener('DOMContentLoaded', async () => {
    try {
        // 1. Lấy dữ liệu tổng hợp
        const [orders, products, users] = await Promise.all([
            fetch(API_ORDERS).then(res => res.json()),
            fetch(API_PRODUCTS).then(res => res.json()),
            fetch(API_USERS).then(res => res.json())
        ]);

        console.log('Orders from API:', orders);
        console.log('Products from API:', products);
        console.log('Users from API:', users);

        // 2. Cập nhật các con số tổng quan (Thống kê)
        updateStats(orders, products, users);

        // 3. Render danh sách đơn hàng gần đây
        renderRecentOrders(orders);

        // 4. Vẽ biểu đồ doanh thu thực tế
        drawRevenueChart(orders);
    } catch (error) {
        console.error('Lỗi tải dữ liệu dashboard:', error);
        alert('Lỗi khi tải dữ liệu. Vui lòng kiểm tra console.');
    }
});

// Hàm cập nhật các ô số liệu (Widgets)
function updateStats(orders, products, users) {
    // Tổng doanh thu (chỉ tính đơn hàng đã 'delivered' - đã giao)
    const deliveredOrders = orders.filter(o => o.status === 'delivered');
    const totalRevenue = deliveredOrders.reduce((sum, o) => sum + (o.total || 0), 0);

    console.log('Delivered orders:', deliveredOrders);
    console.log('Total revenue:', totalRevenue);

    // Lấy các phần tử card
    const statCards = document.querySelectorAll('.card-body p.display-6');
    
    if (statCards.length >= 4) {
        statCards[0].innerText = products.length; // Tổng sản phẩm
        statCards[1].innerText = orders.length;   // Tổng đơn hàng
        statCards[2].innerText = users.length;    // Người dùng
        statCards[3].innerText = totalRevenue.toLocaleString('vi-VN') + 'đ'; // Doanh thu (chỉ delivered)
    }
}

// Hàm render 5 đơn hàng mới nhất
function renderRecentOrders(orders) {
    const tbody = document.querySelector('table tbody');
    tbody.innerHTML = '';
    
    // Sắp xếp đơn hàng mới nhất lên đầu và lấy 5 cái
    const recent = [...orders].reverse().slice(0, 5);

    if (recent.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center">Chưa có đơn hàng</td></tr>';
        return;
    }

    recent.forEach(order => {
        const tr = document.createElement('tr');
        const statusClass = order.status === 'delivered' ? 'bg-success' : 
                           order.status === 'pending' ? 'bg-warning text-dark' : 'bg-danger';
        const statusText = order.status === 'delivered' ? 'Đã giao' : 
                          order.status === 'pending' ? 'Chờ xử lý' : 'Đã hủy';
        
        tr.innerHTML = `
            <td>#${order.id.substring(order.id.length - 5)}</td>
            <td>${order.user.name || order.user.username || 'N/A'}</td>
            <td>${new Date(order.createDate).toLocaleDateString('vi-VN')}</td>
            <td><span class="badge ${statusClass}">${statusText}</span></td>
        `;
        tbody.appendChild(tr);
    });
}

// Hàm vẽ biểu đồ với Google Charts
function drawRevenueChart(orders) {
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(() => {
        // Nhóm doanh thu theo ngày (chỉ những đơn đã giao)
        const revenueByDate = {};
        orders.forEach(o => {
            if(o.status === 'delivered') {
                const date = new Date(o.createDate).toLocaleDateString('vi-VN', {day: '2-digit', month: '2-digit'});
                revenueByDate[date] = (revenueByDate[date] || 0) + o.total;
            }
        });

        // Chuyển dữ liệu sang định dạng Google Charts
        const chartData = [["Ngày", "Doanh thu"]];
        Object.keys(revenueByDate).sort().forEach(date => {
            chartData.push([date, revenueByDate[date]]);
        });

        // Nếu chưa có dữ liệu, hiển thị mặc định
        if(chartData.length === 1) chartData.push(["Chưa có dữ liệu", 0]);

        var data = google.visualization.arrayToDataTable(chartData);
        var options = {
            title: 'Biểu đồ doanh thu thực tế (Đơn hàng đã giao)',
            hAxis: { title: 'Ngày' },
            vAxis: { title: 'VNĐ' },
            colors: ['#ff8c00'],
            legend: { position: 'bottom' }
        };

        var chart = new google.visualization.ColumnChart(document.getElementById('revenue_chart'));
        chart.draw(data, options);
    });
}
    </script>
